---
name: CI
on:
  pull_request:
  push:
    branches: [main, master, 'release-*']
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: true
      - name: Run tests
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: true
      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@v2.12.7
      - name: Reset repository
        run: git reset --hard
      - name: Crossbuild
        run: make crossbuild
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: promql-langserver
          path: |
            dist/*.json
            dist/promql-langserver*
          if-no-files-found: error

  check_repo_consistency:
    name: Check repository consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: true
      - name: Check formatting
        run: |
          make fmt
          git diff --exit-code
      - name: Check internal packages
        run: |
          make update_internal_packages
          git diff --exit-code
      - name: Check go.mod and go.sum
        run: |
          go mod tidy
          git diff --exit-code

  publish_release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [test, build, check_repo_consistency]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    environment: release
    env:
      DOCKER_LOGIN: ${{ secrets.DOCKER_HUB_LOGIN }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
      QUAY_LOGIN: ${{ secrets.QUAY_IO_LOGIN }}
      QUAY_PASSWORD: ${{ secrets.QUAY_IO_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: true
      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@v2.12.7
      - name: Login to Docker Hub
        run: echo "${DOCKER_PASSWORD}" | docker login docker.io -u "${DOCKER_LOGIN}" --password-stdin
      - name: Login to quay.io
        run: echo "${QUAY_PASSWORD}" | docker login quay.io -u "${QUAY_LOGIN}" --password-stdin
      - name: Reset repository
        run: git reset --hard
      - name: Release
        run: make release
        env:
          GITHUB_TOKEN: ${{ github.token }}
